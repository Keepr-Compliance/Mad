name: PR Metrics Validation

# This workflow enforces the Engineer Workflow Compliance requirements
# by validating that PRs carry the linkage needed for metrics attribution.
#
# Requirements (Updated 2026-07-07, BACKLOG-1873):
# 1. Engineer Metrics section must be present
# 2. Agent ID must be present (linkage key into pm_token_metrics)
# 3. Task/Backlog cross-reference (TASK-#### or BACKLOG-####) must be present
#
# Numeric metrics (Total Tokens, Duration, API Calls, Variance) are NOT
# validated in the PR body: they are auto-captured by the SubagentStop hook
# into Supabase pm_token_metrics AFTER the agent finishes, so PR-time values
# were always placeholders. Supabase is the sole numeric store
# (pm_token_metrics; pm_backlog_items.branch_name / pr_url / est / actual).
#
# Exceptions:
# - Dependabot PRs are exempt (automated dependency updates)
# - PRs with [skip-metrics] in title are exempt (use sparingly)
# - PRs with 'hotfix', 'quick-fix', or 'ci-fix' labels are exempt
# - Integration branch PRs (int/*) are exempt (combine multiple tasks)

on:
  pull_request:
    branches: [main, develop, 'int/**']
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-metrics:
    name: Validate PR Metrics
    runs-on: ubuntu-latest

    # Skip for Dependabot PRs
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Check for exempt labels
        id: label-check
        env:
          # Passed via env (not inline ${{ }} in run:) to prevent template injection
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          # Check if PR has any exempt labels
          echo "Labels on PR: $LABELS"

          if echo "$LABELS" | grep -qiE '"(hotfix|quick-fix|ci-fix)"'; then
            echo "exempt=true" >> $GITHUB_OUTPUT
            echo "::notice::Metrics validation skipped - exempt label detected"
          else
            echo "exempt=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for skip flag
        id: skip-check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == int/* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "skip_reason=integration branch" >> $GITHUB_OUTPUT
            echo "::notice::Metrics validation skipped - integration branch (int/*) combines multiple tasks"
          elif [[ "$PR_TITLE" == *"[skip-metrics]"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "skip_reason=title flag" >> $GITHUB_OUTPUT
            echo "::warning::Metrics validation skipped via [skip-metrics] flag"
          elif [[ "${{ steps.label-check.outputs.exempt }}" == "true" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "skip_reason=exempt label" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
          fi

      - name: Validate Engineer Metrics Section
        if: steps.skip-check.outputs.skip != 'true'
        env:
          # Untrusted input passed via env, never interpolated into run: —
          # prevents GitHub Actions workflow injection (a PR body containing
          # a heredoc terminator could otherwise execute arbitrary shell).
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "=== Validating PR Metrics ==="
          echo ""

          # Check 1: Engineer Metrics section exists
          echo "Check 1: Engineer Metrics section..."
          if [[ ! "$PR_BODY" =~ "## Engineer Metrics" ]]; then
            echo "::error::PR missing '## Engineer Metrics' section"
            echo "  Add the Engineer Metrics section to your PR description."
            echo "  See .github/PULL_REQUEST_TEMPLATE.md for the required format."
            exit 1
          fi
          echo "  [PASS] Engineer Metrics section found"

          # Check 2: Agent ID present (linkage key into pm_token_metrics)
          echo ""
          echo "Check 2: Agent ID..."
          if [[ ! "$PR_BODY" =~ "Agent ID" ]] && [[ ! "$PR_BODY" =~ "Engineer Agent ID" ]]; then
            echo "::error::PR missing 'Agent ID'"
            echo "  Add your agent_id — it is the linkage key for pm_token_metrics lookups."
            echo "  See .github/PULL_REQUEST_TEMPLATE.md for the required format."
            exit 1
          fi
          echo "  [PASS] Agent ID found"

          # Check 3: Task/Backlog cross-reference (TASK-#### or BACKLOG-####)
          echo ""
          echo "Check 3: Task/Backlog cross-reference..."
          if [[ ! "$PR_BODY" =~ (TASK|BACKLOG)-[0-9]+ ]]; then
            echo "::error::PR missing task/backlog cross-reference"
            echo "  Reference the driving item as TASK-#### or BACKLOG-#### in the PR body."
            echo "  Every PR must be traceable to a pm_backlog_items row."
            exit 1
          fi
          echo "  [PASS] Task/Backlog cross-reference found"

          echo ""
          echo "Note: numeric metrics are auto-captured to Supabase pm_token_metrics"
          echo "by the SubagentStop hook and are NOT validated in the PR body (BACKLOG-1873)."
          echo ""
          echo "=== All metrics validations passed ==="

      - name: Summary
        if: always()
        run: |
          if [[ "${{ steps.skip-check.outputs.skip }}" == "true" ]]; then
            echo "## PR Metrics Validation: SKIPPED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            SKIP_REASON="${{ steps.skip-check.outputs.skip_reason }}"
            if [[ "$SKIP_REASON" == "exempt label" ]]; then
              echo "Metrics validation was skipped due to exempt label (hotfix/quick-fix/ci-fix)." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> **Note**: Exempt labels are appropriate for urgent fixes that bypass the sprint workflow." >> $GITHUB_STEP_SUMMARY
            else
              echo "Metrics validation was skipped due to [skip-metrics] flag in PR title." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> **Note**: Use [skip-metrics] sparingly. All sprint tasks should include metrics." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## PR Metrics Validation: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All required sections are present:" >> $GITHUB_STEP_SUMMARY
            echo "- [x] Engineer Metrics section" >> $GITHUB_STEP_SUMMARY
            echo "- [x] Agent ID (pm_token_metrics linkage key)" >> $GITHUB_STEP_SUMMARY
            echo "- [x] Task/Backlog cross-reference" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Numeric metrics live in Supabase \`pm_token_metrics\` (auto-captured — BACKLOG-1873)." >> $GITHUB_STEP_SUMMARY
          fi

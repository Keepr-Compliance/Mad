name: Release

# Trigger on push to main branch or manual workflow dispatch
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish release (true/false)'
        required: true
        default: 'true'
        type: boolean

# Required permissions for creating releases
permissions:
  contents: write

jobs:
  # Build and release for macOS
  release-macos:
    name: Release macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      # Import Apple certificate for code signing
      - name: Import Apple Certificate
        id: import-cert
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No certificate configured, skipping import"
            echo "signing_enabled=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate (strip any line breaks/spaces from base64)
          echo "$MACOS_CERTIFICATE" | tr -d '\n\r ' | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Debug: show certificate file size
          echo "Certificate file size:"
          ls -la $RUNNER_TEMP/certificate.p12

          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access the certificate
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "Certificate imported successfully"
          echo "signing_enabled=true" >> $GITHUB_OUTPUT

      # Create .env.production with secrets for runtime use
      # The app loads credentials from this file at runtime (electron/main.ts)
      # NOTE: SUPABASE_SERVICE_KEY is intentionally excluded - it's server-side only
      - name: Create production environment file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          echo "Creating .env.production file..."
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}"
            echo "MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}"
            echo "MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID}"
            echo "BROKER_PORTAL_URL=https://app.keeprcompliance.com"
            echo "SENTRY_DSN=${SENTRY_DSN}"
          } > .env.production
          echo ".env.production created with $(wc -l < .env.production) lines"

      - name: Package and Sign macOS App
        env:
          # Code signing
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # GitHub token for publishing
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sentry source map upload (TASK-1967)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # App runtime secrets (for .env.production recreation after build)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
        run: |
          # Build first (this may overwrite .env.production via vite)
          npm run build

          # Re-create .env.production AFTER build to ensure secrets are present
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}"
            echo "MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}"
            echo "MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID}"
            echo "BROKER_PORTAL_URL=https://app.keeprcompliance.com"
            echo "SENTRY_DSN=${SENTRY_DSN}"
          } > .env.production

          # Verify no unresolved placeholders
          if grep -q '[$]{' .env.production; then
            echo "::error::.env.production contains unresolved placeholders!"
            exit 1
          fi
          echo ".env.production verified: $(wc -l < .env.production) lines"

          # Package with electron-builder (publish handled by Mirror step)
          if [ -n "$CSC_LINK" ]; then
            echo "Packaging signed macOS app..."
            npx electron-builder --publish never
          else
            echo "Packaging unsigned macOS app..."
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --config.mac.identity=null
          fi

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          retention-days: 30

  # Build and release for Windows
  release-windows:
    name: Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      # Download Apple drivers for Windows build
      - name: Download Apple Drivers
        run: |
          echo "Downloading iTunes installer to extract Apple Mobile Device Support..."

          $iTunesUrl = "https://www.apple.com/itunes/download/win64"
          $installerPath = "$env:TEMP\iTunes64Setup.exe"
          $extractPath = "$env:TEMP\iTunes-extracted"
          $targetPath = "resources\win\apple-drivers"

          echo "Downloading from $iTunesUrl..."
          Invoke-WebRequest -Uri $iTunesUrl -OutFile $installerPath -UseBasicParsing

          echo "Download complete. Size: $((Get-Item $installerPath).Length / 1MB) MB"

          # Extract using 7-Zip
          echo "Extracting with 7-Zip..."
          7z x $installerPath -o"$extractPath" -y

          # Find the MSI
          echo "Looking for AppleMobileDeviceSupport MSI..."
          $msi = Get-ChildItem -Path $extractPath -Recurse -Filter "AppleMobileDeviceSupport*.msi" | Select-Object -First 1

          if ($msi) {
            echo "Found: $($msi.FullName)"
            New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
            Copy-Item $msi.FullName -Destination "$targetPath\AppleMobileDeviceSupport64.msi"

            $version = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($msi.FullName).FileVersion
            if (-not $version) { $version = "unknown" }
            Set-Content -Path "$targetPath\version.txt" -Value $version

            echo "Apple drivers extracted successfully!"
          } else {
            echo "::warning::Could not find AppleMobileDeviceSupport MSI"
          }

          # Cleanup
          Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
          Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue
        shell: pwsh

      # Create .env.production with secrets for runtime use
      # The app loads credentials from this file at runtime (electron/main.ts)
      # NOTE: SUPABASE_SERVICE_KEY is intentionally excluded - it's server-side only
      - name: Create production environment file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          $content = @(
            "SUPABASE_URL=$env:SUPABASE_URL",
            "SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY",
            "GOOGLE_CLIENT_ID=$env:GOOGLE_CLIENT_ID",
            "GOOGLE_CLIENT_SECRET=$env:GOOGLE_CLIENT_SECRET",
            "GOOGLE_MAPS_API_KEY=$env:GOOGLE_MAPS_API_KEY",
            "MICROSOFT_CLIENT_ID=$env:MICROSOFT_CLIENT_ID",
            "MICROSOFT_TENANT_ID=$env:MICROSOFT_TENANT_ID",
            "BROKER_PORTAL_URL=https://app.keeprcompliance.com",
            "SENTRY_DSN=$env:SENTRY_DSN"
          ) -join "`n"
          $content | Out-File -FilePath .env.production -Encoding utf8 -NoNewline
          Add-Content -Path .env.production -Value ""
          echo ".env.production created with $($content.Split("`n").Count) lines"
        shell: pwsh

      # BACKLOG-1921: full-chain Windows signing DURING the electron-builder build.
      # Previously we packaged UNSIGNED here and signed only the outer installer in a
      # separate post-build `azure/trusted-signing-action` step. That left the app's
      # own Keepr.exe and the NSIS uninstaller (both packed INSIDE the installer before
      # signing) UNSIGNED — tripping Defender/AV heuristics on launch and showing
      # "unknown publisher" on uninstall.
      #
      # electron-builder v26 signs via `win.azureSignOptions` (Azure Trusted Signing),
      # which signs, in order: the app binary -> the uninstaller -> the installer, then
      # computes latest.yml sha512/size + the .blockmap from the ALREADY-SIGNED
      # installer (NsisTarget signs at packager.sign(installerPath) BEFORE createBlockmap).
      #
      # The Azure identity is UNCHANGED from the old external action: same endpoint,
      # code-signing account, cert profile, RFC3161 timestamp
      # (http://timestamp.acs.microsoft.com) and SHA256 digests, so accrued SmartScreen
      # reputation on the "Blue Spaces LLC" identity is preserved. Entra auth uses the
      # EnvironmentCredential env vars (AZURE_TENANT_ID / AZURE_CLIENT_ID /
      # AZURE_CLIENT_SECRET) that electron-builder's TrustedSigning module reads.
      #
      # azureSignOptions is injected via `--config` CLI overrides (NOT committed to
      # package.json) so it applies ONLY to release builds. ci.yml's `package:unsigned`
      # and local dev builds stay unsigned and never fail for missing Azure creds.
      - name: Package + Sign Windows App (full chain, Azure Trusted Signing)
        env:
          # GitHub token for publishing
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sentry source map upload (TASK-1967)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # Azure Trusted Signing — Entra ID EnvironmentCredential (auth)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # Azure Trusted Signing — account / profile (identity; keep STABLE)
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
          # Secrets for .env.production recreation after build
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
        run: |
          $ErrorActionPreference = "Stop"

          # Fail fast if Azure signing secrets are missing — better a clear error here
          # than an unsigned release or an opaque electron-builder failure mid-build.
          foreach ($v in "AZURE_TENANT_ID","AZURE_CLIENT_ID","AZURE_CLIENT_SECRET","AZURE_ENDPOINT","AZURE_CODE_SIGNING_ACCOUNT","AZURE_CERT_PROFILE") {
            if (-not (Test-Path "env:$v") -or [string]::IsNullOrEmpty((Get-Item "env:$v").Value)) {
              echo "::error::Missing required Azure Trusted Signing secret: $v"
              exit 1
            }
          }

          # Build first (this overwrites .env.production with template)
          npm run build

          # Re-create .env.production AFTER build with real secrets
          $content = @(
            "SUPABASE_URL=$env:SUPABASE_URL",
            "SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY",
            "GOOGLE_CLIENT_ID=$env:GOOGLE_CLIENT_ID",
            "GOOGLE_CLIENT_SECRET=$env:GOOGLE_CLIENT_SECRET",
            "GOOGLE_MAPS_API_KEY=$env:GOOGLE_MAPS_API_KEY",
            "MICROSOFT_CLIENT_ID=$env:MICROSOFT_CLIENT_ID",
            "MICROSOFT_TENANT_ID=$env:MICROSOFT_TENANT_ID",
            "BROKER_PORTAL_URL=https://app.keeprcompliance.com",
            "SENTRY_DSN=$env:SENTRY_DSN"
          ) -join "`n"
          $content | Out-File -FilePath .env.production -Encoding utf8 -NoNewline
          Add-Content -Path .env.production -Value ""

          # Verify no placeholders
          if (Select-String -Path .env.production -Pattern '[$]{') {
            echo "::error::.env.production contains unresolved placeholders!"
            exit 1
          }
          echo ".env.production verified with real secrets"

          # Package AND sign the full chain (app binary + uninstaller + installer) via
          # electron-builder's Azure Trusted Signing. azureSignOptions is passed as
          # --config overrides so it is release-only. FileDigest/TimestampRfc3161/
          # TimestampDigest mirror the old external action exactly. Timestamp MUST be
          # passed explicitly — electron-builder only defaults FileDigest, not the
          # timestamp (see electron-builder#8626), so omitting it would ship an
          # un-timestamped signature.
          npx electron-builder --publish never `
            --config.win.publisherName="Blue Spaces LLC" `
            --config.win.azureSignOptions.endpoint="$env:AZURE_ENDPOINT" `
            --config.win.azureSignOptions.codeSigningAccountName="$env:AZURE_CODE_SIGNING_ACCOUNT" `
            --config.win.azureSignOptions.certificateProfileName="$env:AZURE_CERT_PROFILE" `
            --config.win.azureSignOptions.FileDigest="SHA256" `
            --config.win.azureSignOptions.TimestampRfc3161="http://timestamp.acs.microsoft.com" `
            --config.win.azureSignOptions.TimestampDigest="SHA256"
        shell: pwsh

      # BACKLOG-1921 (supersedes the BACKLOG-1904 regeneration step): now that signing
      # happens DURING the electron-builder build (win.azureSignOptions), electron-builder
      # computes latest.yml sha512/size AND the .blockmap from the ALREADY-SIGNED installer
      # (NsisTarget signs at packager.sign(installerPath) BEFORE createBlockmap). So there
      # is nothing to regenerate — latest.yml and the blockmap are correct as emitted, and
      # the previous stale-blockmap caveat no longer applies.
      #
      # We KEEP a verify-ONLY self-check (no rewrite) as a defence-in-depth guard against a
      # future regression that could reintroduce a manifest/exe mismatch (the BACKLOG-1904 /
      # ticket #63 auto-update break). It recomputes sha512+size from the on-disk signed exe
      # and asserts BOTH the files[] entry (what electron-updater v6 gates on) and the
      # top-level mirror in latest.yml already advertise them. If electron-builder ever
      # emits a mismatched manifest, this fails the release loudly instead of shipping a
      # broken auto-update feed. The independent public-repo strict gate in `create-release`
      # ("Verify release asset integrity") remains a second backstop.
      - name: Verify Windows manifest matches signed exe (BACKLOG-1921)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in dist to verify the manifest against"; exit 1 }
          $ymlPath = Join-Path dist "latest.yml"
          if (-not (Test-Path $ymlPath)) { Write-Error "dist/latest.yml not found"; exit 1 }

          Write-Host "Verifying latest.yml matches the signed exe: $($exe.Name)"

          # Verify-only (binary-safe, self-contained): recompute sha512+size from the
          # on-disk SIGNED exe in node and assert latest.yml already advertises them in
          # BOTH the files[] entry and the top-level mirror. No rewrite. node exits
          # non-zero on any divergence. crypto sha512+base64 matches electron-builder's
          # encoding exactly (== openssl dgst -sha512 -binary | openssl base64).
          $env:VERIFY_EXE = $exe.Name
          $env:VERIFY_YML = $ymlPath
          $env:VERIFY_EXE_PATH = $exe.FullName
          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const buf = fs.readFileSync(process.env.VERIFY_EXE_PATH);
            const sha = crypto.createHash('sha512').update(buf).digest('base64');
            const size = buf.length;
            const name = process.env.VERIFY_EXE;
            const lines = fs.readFileSync(process.env.VERIFY_YML, 'utf8').split('\n');
            let filesUrl = '', filesSha = '', filesSize = '';
            let topPath = '', topSha = '';
            let inTarget = false;
            for (const l of lines) {
              const pm = l.match(/^path:\s*(.+)/); if (pm) topPath = pm[1].trim();
              const th = l.match(/^sha512:\s*(.+)/); if (th) topSha = th[1].trim();
              const um = l.match(/^\s+-?\s*url:\s*(.+)/); if (um) { inTarget = um[1].trim() === name; if (inTarget) filesUrl = um[1].trim(); }
              if (inTarget) { const s = l.match(/^\s+sha512:\s*(.+)/); if (s) filesSha = s[1].trim(); const z = l.match(/^\s+size:\s*(.+)/); if (z) filesSize = z[1].trim(); }
            }
            const problems = [];
            if (filesUrl !== name) problems.push('files[] entry for ' + name + ' not found');
            if (filesSha !== sha) problems.push('files[].sha512 mismatch');
            if (filesSize !== String(size)) problems.push('files[].size mismatch (' + filesSize + ' != ' + size + ')');
            if (topPath === name && topSha !== sha) problems.push('top-level sha512 mismatch');
            if (problems.length) { console.error('Manifest verify FAILED: ' + problems.join('; ')); process.exit(1); }
            console.log('Manifest verify passed — latest.yml matches the signed exe (files[] + top-level).');
            console.log('signed size:   ' + size);
            console.log('signed sha512: ' + sha);
          "
          if ($LASTEXITCODE -ne 0) { Write-Error "Manifest verify failed"; exit 1 }

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          retention-days: 30

  # Create GitHub Release (after both platforms complete)
  create-release:
    name: Create GitHub Release
    needs: [release-macos, release-windows]
    runs-on: ubuntu-latest
    # Create release if at least one platform succeeded
    if: always() && (needs.release-macos.result == 'success' || needs.release-windows.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.*" | head -50

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Keepr v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          files: |
            artifacts/release-macos/*
            artifacts/release-windows/*
          body: |
            ## Keepr v${{ steps.version.outputs.version }}

            ### Downloads

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `Keepr-${{ steps.version.outputs.version }}-arm64.dmg` |
            | macOS (Intel) | `Keepr-${{ steps.version.outputs.version }}-x64.dmg` |
            | Windows | `Keepr-Setup-${{ steps.version.outputs.version }}.exe` |

            ### What's New

            <!-- Add release notes here -->

            ### Installation

            **macOS**: Download the `.dmg` file, open it, and drag Keepr to your Applications folder.

            **Windows**: Download the `.exe` installer and run it. The installer is signed by Blue Spaces LLC.

            ---

            🤖 Release created automatically from main branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Mirror release assets to the public repo so the download page works
      # without GitHub authentication
      - name: Mirror to public releases repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          VERSION: v${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PUBLIC_REPO="Keepr-Compliance/keepr-releases"

          echo "Mirroring release ${VERSION} to ${PUBLIC_REPO}..."

          # Attempt to create the release in the public repo.
          # If it already exists (exit 1 with "already exists" message), fall
          # through to upload so assets are updated / re-uploaded. Any other
          # create error surfaces loudly — do NOT redirect stderr.
          CREATE_STDERR=$(mktemp)
          if gh release create "${VERSION}" \
            --repo "${PUBLIC_REPO}" \
            --title "Keepr ${VERSION}" \
            --notes "Download the Keepr desktop app. Visit [keeprcompliance.com](https://www.keeprcompliance.com) for more info." \
            artifacts/release-macos/*.dmg \
            artifacts/release-macos/*.zip \
            artifacts/release-macos/*.yml \
            artifacts/release-macos/*.blockmap \
            artifacts/release-windows/*.exe \
            artifacts/release-windows/*.yml \
            artifacts/release-windows/*.blockmap \
            2>"${CREATE_STDERR}"; then
            echo "Release created successfully."
          else
            CREATE_EXIT=$?
            CREATE_ERR=$(cat "${CREATE_STDERR}")
            echo "::notice::gh release create exited ${CREATE_EXIT}: ${CREATE_ERR}"
            if echo "${CREATE_ERR}" | grep -qi "already exists"; then
              echo "Release already exists — uploading/updating assets instead."
              gh release upload "${VERSION}" \
                --repo "${PUBLIC_REPO}" \
                --clobber \
                artifacts/release-macos/*.dmg \
                artifacts/release-macos/*.zip \
                artifacts/release-macos/*.yml \
                artifacts/release-macos/*.blockmap \
                artifacts/release-windows/*.exe \
                artifacts/release-windows/*.yml \
                artifacts/release-windows/*.blockmap
            else
              echo "::error::gh release create failed with an unexpected error: ${CREATE_ERR}"
              exit "${CREATE_EXIT}"
            fi
          fi
          rm -f "${CREATE_STDERR}"

      - name: Assert mirror published required assets
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          VERSION: v${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PUBLIC_REPO="Keepr-Compliance/keepr-releases"

          echo "Asserting required auto-updater assets exist in ${PUBLIC_REPO} for ${VERSION}..."

          ASSETS=$(gh release view "${VERSION}" --repo "${PUBLIC_REPO}" --json assets --jq '[.assets[].name]')
          echo "Published assets: ${ASSETS}"

          MISSING=()
          for REQUIRED in "latest-mac.yml" "latest.yml"; do
            if ! echo "${ASSETS}" | grep -q "\"${REQUIRED}\""; then
              MISSING+=("${REQUIRED}")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Mirror assertion FAILED — the following required auto-updater assets are missing from ${PUBLIC_REPO}@${VERSION}: ${MISSING[*]}"
            exit 1
          fi

          echo "Mirror assertion passed — all required auto-updater assets are present."

      # Verify that the sha512 hashes in latest.yml / latest-mac.yml match
      # what GitHub actually serves. GitHub may alter binaries during upload,
      # causing auto-updater checksum failures (see BACKLOG-1642).
      - name: Verify release asset integrity
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          PRIVATE_REPO="${GITHUB_REPOSITORY}"
          PUBLIC_REPO="Keepr-Compliance/keepr-releases"
          VERIFY_DIR=$(mktemp -d)
          MISMATCH_FOUND=false

          echo "=== Verifying release asset integrity for ${VERSION} ==="

          # ── Helper: compute sha512 in base64 (matches electron-builder format) ──
          compute_hash() {
            openssl dgst -sha512 -binary "$1" | openssl base64 -A
          }

          # ── Helper: extract hash for a filename from a yml file ──
          # electron-builder yml has: top-level sha512/path, and files[].sha512/url
          extract_hash() {
            local YML_FILE="$1"
            local ASSET_NAME="$2"
            node -e "
              const fs = require('fs');
              const content = fs.readFileSync('${YML_FILE}', 'utf8');
              // Parse the simple YAML manually — electron-builder format is predictable
              // Top-level: path: <name>\nsha512: <hash>
              // Files section: - url: <name>\n  sha512: <hash>
              const lines = content.split('\n');

              // Check top-level path match
              let topPath = '', topHash = '';
              for (const line of lines) {
                const pm = line.match(/^path:\s*(.+)/);
                if (pm) topPath = pm[1].trim();
                const hm = line.match(/^sha512:\s*(.+)/);
                if (hm) topHash = hm[1].trim();
              }
              if (topPath === '${ASSET_NAME}' && topHash) {
                process.stdout.write(topHash);
                process.exit(0);
              }

              // Check files entries
              let currentUrl = '';
              for (const line of lines) {
                const um = line.match(/^\s+-?\s*url:\s*(.+)/);
                if (um) currentUrl = um[1].trim();
                const sm = line.match(/^\s+sha512:\s*(.+)/);
                if (sm && currentUrl === '${ASSET_NAME}') {
                  process.stdout.write(sm[1].trim());
                  process.exit(0);
                }
              }
              // Not found — output empty
            " 2>/dev/null || true
          }

          # ── Helper: update hash for a filename in a yml file ──
          update_hash() {
            local YML_FILE="$1"
            local ASSET_NAME="$2"
            local NEW_HASH="$3"
            local NEW_SIZE="$4"
            node -e "
              const fs = require('fs');
              let content = fs.readFileSync('${YML_FILE}', 'utf8');
              const lines = content.split('\n');
              const result = [];
              let topPath = '';
              let inTargetFile = false;

              for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                // Detect top-level path
                const pm = line.match(/^path:\s*(.+)/);
                if (pm) topPath = pm[1].trim();

                // Replace top-level sha512 if path matches
                if (line.match(/^sha512:\s/) && topPath === '${ASSET_NAME}') {
                  line = 'sha512: ${NEW_HASH}';
                }

                // Replace top-level size if path matches
                if (line.match(/^size:\s/) && topPath === '${ASSET_NAME}') {
                  line = 'size: ${NEW_SIZE}';
                }

                // Track which file entry we are in
                const um = line.match(/^(\s+-?\s*)url:\s*(.+)/);
                if (um) {
                  inTargetFile = um[2].trim() === '${ASSET_NAME}';
                }

                // Replace sha512 in the matching files entry
                if (inTargetFile && line.match(/^\s+sha512:\s/)) {
                  const indent = line.match(/^(\s+)/)[1];
                  line = indent + 'sha512: ${NEW_HASH}';
                }

                // Replace size in the matching files entry
                if (inTargetFile && line.match(/^\s+size:\s/)) {
                  const indent = line.match(/^(\s+)/)[1];
                  line = indent + 'size: ${NEW_SIZE}';
                }

                result.push(line);
              }
              fs.writeFileSync('${YML_FILE}', result.join('\n'));
            "
          }

          # ── Helper: verify and fix one asset file against its yml ──
          verify_asset() {
            local ASSET_FILE="$1"
            local YML_FILE="$2"
            local TOKEN="$3"
            local REPO="$4"
            local REPO_LABEL="$5"

            local ASSET_NAME
            ASSET_NAME=$(basename "${ASSET_FILE}")
            local YML_NAME
            YML_NAME=$(basename "${YML_FILE}")

            local ACTUAL_HASH
            ACTUAL_HASH=$(compute_hash "${ASSET_FILE}")

            local EXPECTED_HASH
            EXPECTED_HASH=$(extract_hash "${YML_FILE}" "${ASSET_NAME}")

            if [ -z "${EXPECTED_HASH}" ]; then
              echo "  Skip: ${ASSET_NAME} not referenced in ${YML_NAME}"
              return 0
            fi

            if [ "${ACTUAL_HASH}" = "${EXPECTED_HASH}" ]; then
              echo "  OK: ${ASSET_NAME} hash matches ${YML_NAME}"
            else
              echo "::warning::MISMATCH in ${REPO_LABEL}: ${ASSET_NAME} hash differs from ${YML_NAME}"
              echo "    Expected: ${EXPECTED_HASH}"
              echo "    Actual:   ${ACTUAL_HASH}"
              MISMATCH_FOUND=true

              local ACTUAL_SIZE
              ACTUAL_SIZE=$(stat -c%s "${ASSET_FILE}" 2>/dev/null || stat -f%z "${ASSET_FILE}")

              update_hash "${YML_FILE}" "${ASSET_NAME}" "${ACTUAL_HASH}" "${ACTUAL_SIZE}"
              echo "    Updated ${YML_NAME} with correct hash"

              # Return non-zero to signal the yml needs re-uploading
              return 1
            fi
          }

          # ── Main: verify one repo ──────────────────────────────────
          verify_repo() {
            local REPO="$1"
            local TOKEN="$2"
            local REPO_LABEL="$3"
            local DL_DIR="${VERIFY_DIR}/${REPO_LABEL}"
            mkdir -p "${DL_DIR}"

            echo ""
            echo "--- Verifying ${REPO_LABEL} (${REPO}) ---"

            # Download all release assets
            GH_TOKEN="${TOKEN}" gh release download "${VERSION}" \
              --repo "${REPO}" \
              --dir "${DL_DIR}" 2>/dev/null || {
                echo "::warning::Could not download assets from ${REPO}. Skipping."
                return 0
              }

            echo "Downloaded assets:"
            ls -la "${DL_DIR}/"

            # ── Windows: verify .exe against latest.yml ──
            if [ -f "${DL_DIR}/latest.yml" ]; then
              echo ""
              echo "Checking Windows assets..."
              local WIN_NEEDS_UPLOAD=false
              for EXE_FILE in "${DL_DIR}"/*.exe; do
                [ -f "${EXE_FILE}" ] || continue
                verify_asset "${EXE_FILE}" "${DL_DIR}/latest.yml" "${TOKEN}" "${REPO}" "${REPO_LABEL}" || WIN_NEEDS_UPLOAD=true
              done
              if [ "${WIN_NEEDS_UPLOAD}" = true ]; then
                echo "  Re-uploading corrected latest.yml to ${REPO_LABEL}..."
                GH_TOKEN="${TOKEN}" gh release upload "${VERSION}" \
                  --repo "${REPO}" --clobber "${DL_DIR}/latest.yml"
              fi
            fi

            # ── macOS: verify .dmg and .zip against latest-mac.yml ──
            if [ -f "${DL_DIR}/latest-mac.yml" ]; then
              echo ""
              echo "Checking macOS assets..."
              local MAC_NEEDS_UPLOAD=false
              for DMG_FILE in "${DL_DIR}"/*.dmg; do
                [ -f "${DMG_FILE}" ] || continue
                verify_asset "${DMG_FILE}" "${DL_DIR}/latest-mac.yml" "${TOKEN}" "${REPO}" "${REPO_LABEL}" || MAC_NEEDS_UPLOAD=true
              done
              for ZIP_FILE in "${DL_DIR}"/*.zip; do
                [ -f "${ZIP_FILE}" ] || continue
                verify_asset "${ZIP_FILE}" "${DL_DIR}/latest-mac.yml" "${TOKEN}" "${REPO}" "${REPO_LABEL}" || MAC_NEEDS_UPLOAD=true
              done
              if [ "${MAC_NEEDS_UPLOAD}" = true ]; then
                echo "  Re-uploading corrected latest-mac.yml to ${REPO_LABEL}..."
                GH_TOKEN="${TOKEN}" gh release upload "${VERSION}" \
                  --repo "${REPO}" --clobber "${DL_DIR}/latest-mac.yml"
              fi
            fi
          }

          # ── Strict gate (BACKLOG-1904): re-download and re-verify WITHOUT any
          # auto-correction. Any surviving sha512/size mismatch fails the release
          # so a broken auto-update feed can never reach users. This is the guard
          # that the self-healing pass above (BACKLOG-1642) lacked: previously a
          # mismatch only emitted ::warning:: and the workflow stayed green, and if
          # the earlier mirror step failed the correction never ran at all
          # (ticket #63 / the v2.21.0 break).
          #
          # SCOPE OF THE HARD GATE: only the PUBLIC repo (Keepr-Compliance/
          # keepr-releases) is authoritative — that is the ONLY feed end users' auto-
          # updater consumes. The PRIVATE repo release is a draft mirror; its assets
          # are the same signed binaries but a transient `gh release download` blip or
          # a draft-visibility quirk there must NOT block a public release that is
          # itself correct. So the public check is ENFORCE=true (mismatch => exit 1)
          # and the private check is ENFORCE=false (mismatch/failure => warning only).
          # ──────────────────────────────────────────────────────────────────────
          STRICT_FAIL=false

          # Read-only: recompute the on-disk asset's hash and compare to the yml.
          # No update_hash, no re-upload. On divergence: sets STRICT_FAIL only when
          # ENFORCE=true (4th arg); otherwise warns. Never rewrites anything.
          strict_verify_asset() {
            local ASSET_FILE="$1"; local YML_FILE="$2"; local REPO_LABEL="$3"; local ENFORCE="$4"
            local ASSET_NAME; ASSET_NAME=$(basename "${ASSET_FILE}")
            local YML_NAME; YML_NAME=$(basename "${YML_FILE}")
            local EXPECTED_HASH; EXPECTED_HASH=$(extract_hash "${YML_FILE}" "${ASSET_NAME}")
            if [ -z "${EXPECTED_HASH}" ]; then
              echo "  Skip (strict): ${ASSET_NAME} not referenced in ${YML_NAME}"
              return 0
            fi
            local ACTUAL_HASH; ACTUAL_HASH=$(compute_hash "${ASSET_FILE}")
            if [ "${ACTUAL_HASH}" = "${EXPECTED_HASH}" ]; then
              echo "  OK (strict): ${ASSET_NAME} matches ${YML_NAME} in ${REPO_LABEL}"
            elif [ "${ENFORCE}" = "true" ]; then
              echo "::error::STRICT MISMATCH in ${REPO_LABEL}: ${ASSET_NAME} sha512 != ${YML_NAME}"
              echo "    Expected (yml): ${EXPECTED_HASH}"
              echo "    Actual  (file): ${ACTUAL_HASH}"
              STRICT_FAIL=true
            else
              echo "::warning::strict mismatch in ${REPO_LABEL} (non-blocking): ${ASSET_NAME} sha512 != ${YML_NAME}"
              echo "    Expected (yml): ${EXPECTED_HASH}"
              echo "    Actual  (file): ${ACTUAL_HASH}"
            fi
          }

          strict_verify_repo() {
            local REPO="$1"; local TOKEN="$2"; local REPO_LABEL="$3"; local ENFORCE="$4"
            local DL_DIR="${VERIFY_DIR}/strict-${REPO_LABEL}"
            mkdir -p "${DL_DIR}"
            echo ""
            echo "--- STRICT verify ${REPO_LABEL} (${REPO}) [enforce=${ENFORCE}] ---"
            GH_TOKEN="${TOKEN}" gh release download "${VERSION}" --repo "${REPO}" --dir "${DL_DIR}" 2>/dev/null || {
              if [ "${ENFORCE}" = "true" ]; then
                echo "::error::STRICT: could not download assets from ${REPO} to verify the published feed"
                STRICT_FAIL=true
              else
                echo "::warning::strict verify skipped for ${REPO_LABEL} (non-blocking): could not download assets"
              fi
              return 0
            }
            if [ -f "${DL_DIR}/latest.yml" ]; then
              for EXE_FILE in "${DL_DIR}"/*.exe; do
                [ -f "${EXE_FILE}" ] || continue
                strict_verify_asset "${EXE_FILE}" "${DL_DIR}/latest.yml" "${REPO_LABEL}" "${ENFORCE}"
              done
            fi
            if [ -f "${DL_DIR}/latest-mac.yml" ]; then
              for MAC_ASSET in "${DL_DIR}"/*.dmg "${DL_DIR}"/*.zip; do
                [ -f "${MAC_ASSET}" ] || continue
                strict_verify_asset "${MAC_ASSET}" "${DL_DIR}/latest-mac.yml" "${REPO_LABEL}" "${ENFORCE}"
              done
            fi
          }

          # Verify both repos — public first (auto-updater fetches from here)
          verify_repo "${PUBLIC_REPO}" "${GH_TOKEN}" "public"
          verify_repo "${PRIVATE_REPO}" "${GITHUB_TOKEN}" "private"

          if [ "${MISMATCH_FOUND}" = true ]; then
            echo ""
            echo "::warning::Hash mismatches were detected and auto-corrected. Re-verifying the corrected published feed..."
          fi

          # Final authoritative gate: re-fetch and compare, no corrections allowed.
          # PUBLIC is the hard gate (blocks release); PRIVATE draft mirror is advisory.
          strict_verify_repo "${PUBLIC_REPO}" "${GH_TOKEN}" "public" "true"
          strict_verify_repo "${PRIVATE_REPO}" "${GITHUB_TOKEN}" "private" "false"

          # Cleanup
          rm -rf "${VERIFY_DIR}"

          if [ "${STRICT_FAIL}" = true ]; then
            echo ""
            echo "::error::Release BLOCKED — the published auto-updater manifest does not match the published installers (sha512/size mismatch survived correction). Shipping this would break auto-update on end-user machines."
            exit 1
          fi

          echo ""
          echo "All published release assets verified against their manifests (both repos)."

name: Release

# Trigger on push to main branch or manual workflow dispatch
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish release (true/false)'
        required: true
        default: 'true'
        type: boolean

# Required permissions for creating releases
permissions:
  contents: write

jobs:
  # Build and release for macOS
  release-macos:
    name: Release macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      # Import Apple certificate for code signing
      - name: Import Apple Certificate
        id: import-cert
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No certificate configured, skipping import"
            echo "signing_enabled=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate (strip any line breaks/spaces from base64)
          echo "$MACOS_CERTIFICATE" | tr -d '\n\r ' | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Debug: show certificate file size
          echo "Certificate file size:"
          ls -la $RUNNER_TEMP/certificate.p12

          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access the certificate
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "Certificate imported successfully"
          echo "signing_enabled=true" >> $GITHUB_OUTPUT

      # Create .env.production with secrets for runtime use
      # The app loads credentials from this file at runtime (electron/main.ts)
      # NOTE: SUPABASE_SERVICE_KEY is intentionally excluded - it's server-side only
      - name: Create production environment file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          echo "Creating .env.production file..."
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}"
            echo "MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}"
            echo "MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID}"
            echo "BROKER_PORTAL_URL=https://app.keeprcompliance.com"
            echo "SENTRY_DSN=${SENTRY_DSN}"
          } > .env.production
          echo ".env.production created with $(wc -l < .env.production) lines"

      - name: Package and Sign macOS App
        env:
          # Code signing
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # GitHub token for publishing
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sentry source map upload (TASK-1967)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # App runtime secrets (for .env.production recreation after build)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
        run: |
          # Build first (this may overwrite .env.production via vite)
          npm run build

          # Re-create .env.production AFTER build to ensure secrets are present
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}"
            echo "MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}"
            echo "MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID}"
            echo "BROKER_PORTAL_URL=https://app.keeprcompliance.com"
            echo "SENTRY_DSN=${SENTRY_DSN}"
          } > .env.production

          # Verify no unresolved placeholders
          if grep -q '[$]{' .env.production; then
            echo "::error::.env.production contains unresolved placeholders!"
            exit 1
          fi
          echo ".env.production verified: $(wc -l < .env.production) lines"

          # Package with electron-builder (publish handled by Mirror step)
          if [ -n "$CSC_LINK" ]; then
            echo "Packaging signed macOS app..."
            npx electron-builder --publish never
          else
            echo "Packaging unsigned macOS app..."
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --config.mac.identity=null
          fi

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          retention-days: 30

  # Build and release for Windows
  release-windows:
    name: Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      # Download Apple drivers for Windows build
      - name: Download Apple Drivers
        run: |
          echo "Downloading iTunes installer to extract Apple Mobile Device Support..."

          $iTunesUrl = "https://www.apple.com/itunes/download/win64"
          $installerPath = "$env:TEMP\iTunes64Setup.exe"
          $extractPath = "$env:TEMP\iTunes-extracted"
          $targetPath = "resources\win\apple-drivers"

          echo "Downloading from $iTunesUrl..."
          Invoke-WebRequest -Uri $iTunesUrl -OutFile $installerPath -UseBasicParsing

          echo "Download complete. Size: $((Get-Item $installerPath).Length / 1MB) MB"

          # Extract using 7-Zip
          echo "Extracting with 7-Zip..."
          7z x $installerPath -o"$extractPath" -y

          # Find the MSI
          echo "Looking for AppleMobileDeviceSupport MSI..."
          $msi = Get-ChildItem -Path $extractPath -Recurse -Filter "AppleMobileDeviceSupport*.msi" | Select-Object -First 1

          if ($msi) {
            echo "Found: $($msi.FullName)"
            New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
            Copy-Item $msi.FullName -Destination "$targetPath\AppleMobileDeviceSupport64.msi"

            $version = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($msi.FullName).FileVersion
            if (-not $version) { $version = "unknown" }
            Set-Content -Path "$targetPath\version.txt" -Value $version

            echo "Apple drivers extracted successfully!"
          } else {
            echo "::warning::Could not find AppleMobileDeviceSupport MSI"
          }

          # Cleanup
          Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
          Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue
        shell: pwsh

      # Create .env.production with secrets for runtime use
      # The app loads credentials from this file at runtime (electron/main.ts)
      # NOTE: SUPABASE_SERVICE_KEY is intentionally excluded - it's server-side only
      - name: Create production environment file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          $content = @(
            "SUPABASE_URL=$env:SUPABASE_URL",
            "SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY",
            "GOOGLE_CLIENT_ID=$env:GOOGLE_CLIENT_ID",
            "GOOGLE_CLIENT_SECRET=$env:GOOGLE_CLIENT_SECRET",
            "GOOGLE_MAPS_API_KEY=$env:GOOGLE_MAPS_API_KEY",
            "MICROSOFT_CLIENT_ID=$env:MICROSOFT_CLIENT_ID",
            "MICROSOFT_TENANT_ID=$env:MICROSOFT_TENANT_ID",
            "BROKER_PORTAL_URL=https://app.keeprcompliance.com",
            "SENTRY_DSN=$env:SENTRY_DSN"
          ) -join "`n"
          $content | Out-File -FilePath .env.production -Encoding utf8 -NoNewline
          Add-Content -Path .env.production -Value ""
          echo ".env.production created with $($content.Split("`n").Count) lines"
        shell: pwsh

      - name: Package Windows App (unsigned)
        env:
          # GitHub token for publishing
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sentry source map upload (TASK-1967)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # Secrets for .env.production recreation after build
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
        run: |
          # Build first (this overwrites .env.production with template)
          npm run build

          # Re-create .env.production AFTER build with real secrets
          $content = @(
            "SUPABASE_URL=$env:SUPABASE_URL",
            "SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY",
            "GOOGLE_CLIENT_ID=$env:GOOGLE_CLIENT_ID",
            "GOOGLE_CLIENT_SECRET=$env:GOOGLE_CLIENT_SECRET",
            "GOOGLE_MAPS_API_KEY=$env:GOOGLE_MAPS_API_KEY",
            "MICROSOFT_CLIENT_ID=$env:MICROSOFT_CLIENT_ID",
            "MICROSOFT_TENANT_ID=$env:MICROSOFT_TENANT_ID",
            "BROKER_PORTAL_URL=https://app.keeprcompliance.com",
            "SENTRY_DSN=$env:SENTRY_DSN"
          ) -join "`n"
          $content | Out-File -FilePath .env.production -Encoding utf8 -NoNewline
          Add-Content -Path .env.production -Value ""

          # Verify no placeholders
          if (Select-String -Path .env.production -Pattern '[$]{') {
            echo "::error::.env.production contains unresolved placeholders!"
            exit 1
          }
          echo ".env.production verified with real secrets"

          # Package unsigned — Azure Trusted Signing signs in the next step
          npx electron-builder --publish never
        shell: pwsh

      - name: Sign Windows App with Azure Trusted Signing
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          retention-days: 30

  # Create GitHub Release (after both platforms complete)
  create-release:
    name: Create GitHub Release
    needs: [release-macos, release-windows]
    runs-on: ubuntu-latest
    # Create release if at least one platform succeeded
    if: always() && (needs.release-macos.result == 'success' || needs.release-windows.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.*" | head -50

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Keepr v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          files: |
            artifacts/release-macos/*
            artifacts/release-windows/*
          body: |
            ## Keepr v${{ steps.version.outputs.version }}

            ### Downloads

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `Keepr-${{ steps.version.outputs.version }}-arm64.dmg` |
            | macOS (Intel) | `Keepr-${{ steps.version.outputs.version }}-x64.dmg` |
            | Windows | `Keepr-Setup-${{ steps.version.outputs.version }}.exe` |

            ### What's New

            <!-- Add release notes here -->

            ### Installation

            **macOS**: Download the `.dmg` file, open it, and drag Keepr to your Applications folder.

            **Windows**: Download the `.exe` installer and run it. The installer is signed by Blue Spaces LLC.

            ---

            🤖 Release created automatically from main branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Mirror release assets to the public repo so the download page works
      # without GitHub authentication
      - name: Mirror to public releases repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          VERSION: v${{ steps.version.outputs.version }}
        run: |
          PUBLIC_REPO="5hdaniel/keepr-releases"

          echo "Mirroring release ${VERSION} to ${PUBLIC_REPO}..."

          # Create the release in the public repo (or update if exists)
          gh release create "${VERSION}" \
            --repo "${PUBLIC_REPO}" \
            --title "Keepr ${VERSION}" \
            --notes "Download the Keepr desktop app. Visit [keeprcompliance.com](https://www.keeprcompliance.com) for more info." \
            artifacts/release-macos/*.dmg \
            artifacts/release-macos/*.zip \
            artifacts/release-macos/*.yml \
            artifacts/release-macos/*.blockmap \
            artifacts/release-windows/*.exe \
            artifacts/release-windows/*.yml \
            artifacts/release-windows/*.blockmap \
            2>/dev/null || \
          gh release upload "${VERSION}" \
            --repo "${PUBLIC_REPO}" \
            --clobber \
            artifacts/release-macos/*.dmg \
            artifacts/release-macos/*.zip \
            artifacts/release-macos/*.yml \
            artifacts/release-macos/*.blockmap \
            artifacts/release-windows/*.exe \
            artifacts/release-windows/*.yml \
            artifacts/release-windows/*.blockmap

      # Verify that the sha512 hashes in latest.yml / latest-mac.yml match
      # what GitHub actually serves. GitHub may alter binaries during upload,
      # causing auto-updater checksum failures (see BACKLOG-1642).
      - name: Verify release asset integrity
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          PRIVATE_REPO="${GITHUB_REPOSITORY}"
          PUBLIC_REPO="5hdaniel/keepr-releases"
          VERIFY_DIR=$(mktemp -d)
          MISMATCH_FOUND=false

          echo "=== Verifying release asset integrity for ${VERSION} ==="

          # ── Helper: compute sha512 in base64 (matches electron-builder format) ──
          compute_hash() {
            openssl dgst -sha512 -binary "$1" | openssl base64 -A
          }

          # ── Helper: extract hash for a filename from a yml file ──
          # electron-builder yml has: top-level sha512/path, and files[].sha512/url
          extract_hash() {
            local YML_FILE="$1"
            local ASSET_NAME="$2"
            node -e "
              const fs = require('fs');
              const content = fs.readFileSync('${YML_FILE}', 'utf8');
              // Parse the simple YAML manually — electron-builder format is predictable
              // Top-level: path: <name>\nsha512: <hash>
              // Files section: - url: <name>\n  sha512: <hash>
              const lines = content.split('\n');

              // Check top-level path match
              let topPath = '', topHash = '';
              for (const line of lines) {
                const pm = line.match(/^path:\s*(.+)/);
                if (pm) topPath = pm[1].trim();
                const hm = line.match(/^sha512:\s*(.+)/);
                if (hm) topHash = hm[1].trim();
              }
              if (topPath === '${ASSET_NAME}' && topHash) {
                process.stdout.write(topHash);
                process.exit(0);
              }

              // Check files entries
              let currentUrl = '';
              for (const line of lines) {
                const um = line.match(/^\s+-?\s*url:\s*(.+)/);
                if (um) currentUrl = um[1].trim();
                const sm = line.match(/^\s+sha512:\s*(.+)/);
                if (sm && currentUrl === '${ASSET_NAME}') {
                  process.stdout.write(sm[1].trim());
                  process.exit(0);
                }
              }
              // Not found — output empty
            " 2>/dev/null || true
          }

          # ── Helper: update hash for a filename in a yml file ──
          update_hash() {
            local YML_FILE="$1"
            local ASSET_NAME="$2"
            local NEW_HASH="$3"
            local NEW_SIZE="$4"
            node -e "
              const fs = require('fs');
              let content = fs.readFileSync('${YML_FILE}', 'utf8');
              const lines = content.split('\n');
              const result = [];
              let topPath = '';
              let inTargetFile = false;

              for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                // Detect top-level path
                const pm = line.match(/^path:\s*(.+)/);
                if (pm) topPath = pm[1].trim();

                // Replace top-level sha512 if path matches
                if (line.match(/^sha512:\s/) && topPath === '${ASSET_NAME}') {
                  line = 'sha512: ${NEW_HASH}';
                }

                // Replace top-level size if path matches
                if (line.match(/^size:\s/) && topPath === '${ASSET_NAME}') {
                  line = 'size: ${NEW_SIZE}';
                }

                // Track which file entry we are in
                const um = line.match(/^(\s+-?\s*)url:\s*(.+)/);
                if (um) {
                  inTargetFile = um[2].trim() === '${ASSET_NAME}';
                }

                // Replace sha512 in the matching files entry
                if (inTargetFile && line.match(/^\s+sha512:\s/)) {
                  const indent = line.match(/^(\s+)/)[1];
                  line = indent + 'sha512: ${NEW_HASH}';
                }

                // Replace size in the matching files entry
                if (inTargetFile && line.match(/^\s+size:\s/)) {
                  const indent = line.match(/^(\s+)/)[1];
                  line = indent + 'size: ${NEW_SIZE}';
                }

                result.push(line);
              }
              fs.writeFileSync('${YML_FILE}', result.join('\n'));
            "
          }

          # ── Helper: verify and fix one asset file against its yml ──
          verify_asset() {
            local ASSET_FILE="$1"
            local YML_FILE="$2"
            local TOKEN="$3"
            local REPO="$4"
            local REPO_LABEL="$5"

            local ASSET_NAME
            ASSET_NAME=$(basename "${ASSET_FILE}")
            local YML_NAME
            YML_NAME=$(basename "${YML_FILE}")

            local ACTUAL_HASH
            ACTUAL_HASH=$(compute_hash "${ASSET_FILE}")

            local EXPECTED_HASH
            EXPECTED_HASH=$(extract_hash "${YML_FILE}" "${ASSET_NAME}")

            if [ -z "${EXPECTED_HASH}" ]; then
              echo "  Skip: ${ASSET_NAME} not referenced in ${YML_NAME}"
              return 0
            fi

            if [ "${ACTUAL_HASH}" = "${EXPECTED_HASH}" ]; then
              echo "  OK: ${ASSET_NAME} hash matches ${YML_NAME}"
            else
              echo "::warning::MISMATCH in ${REPO_LABEL}: ${ASSET_NAME} hash differs from ${YML_NAME}"
              echo "    Expected: ${EXPECTED_HASH}"
              echo "    Actual:   ${ACTUAL_HASH}"
              MISMATCH_FOUND=true

              local ACTUAL_SIZE
              ACTUAL_SIZE=$(stat -c%s "${ASSET_FILE}" 2>/dev/null || stat -f%z "${ASSET_FILE}")

              update_hash "${YML_FILE}" "${ASSET_NAME}" "${ACTUAL_HASH}" "${ACTUAL_SIZE}"
              echo "    Updated ${YML_NAME} with correct hash"

              # Return non-zero to signal the yml needs re-uploading
              return 1
            fi
          }

          # ── Main: verify one repo ──────────────────────────────────
          verify_repo() {
            local REPO="$1"
            local TOKEN="$2"
            local REPO_LABEL="$3"
            local DL_DIR="${VERIFY_DIR}/${REPO_LABEL}"
            mkdir -p "${DL_DIR}"

            echo ""
            echo "--- Verifying ${REPO_LABEL} (${REPO}) ---"

            # Download all release assets
            GH_TOKEN="${TOKEN}" gh release download "${VERSION}" \
              --repo "${REPO}" \
              --dir "${DL_DIR}" 2>/dev/null || {
                echo "::warning::Could not download assets from ${REPO}. Skipping."
                return 0
              }

            echo "Downloaded assets:"
            ls -la "${DL_DIR}/"

            # ── Windows: verify .exe against latest.yml ──
            if [ -f "${DL_DIR}/latest.yml" ]; then
              echo ""
              echo "Checking Windows assets..."
              local WIN_NEEDS_UPLOAD=false
              for EXE_FILE in "${DL_DIR}"/*.exe; do
                [ -f "${EXE_FILE}" ] || continue
                verify_asset "${EXE_FILE}" "${DL_DIR}/latest.yml" "${TOKEN}" "${REPO}" "${REPO_LABEL}" || WIN_NEEDS_UPLOAD=true
              done
              if [ "${WIN_NEEDS_UPLOAD}" = true ]; then
                echo "  Re-uploading corrected latest.yml to ${REPO_LABEL}..."
                GH_TOKEN="${TOKEN}" gh release upload "${VERSION}" \
                  --repo "${REPO}" --clobber "${DL_DIR}/latest.yml"
              fi
            fi

            # ── macOS: verify .dmg and .zip against latest-mac.yml ──
            if [ -f "${DL_DIR}/latest-mac.yml" ]; then
              echo ""
              echo "Checking macOS assets..."
              local MAC_NEEDS_UPLOAD=false
              for DMG_FILE in "${DL_DIR}"/*.dmg; do
                [ -f "${DMG_FILE}" ] || continue
                verify_asset "${DMG_FILE}" "${DL_DIR}/latest-mac.yml" "${TOKEN}" "${REPO}" "${REPO_LABEL}" || MAC_NEEDS_UPLOAD=true
              done
              for ZIP_FILE in "${DL_DIR}"/*.zip; do
                [ -f "${ZIP_FILE}" ] || continue
                verify_asset "${ZIP_FILE}" "${DL_DIR}/latest-mac.yml" "${TOKEN}" "${REPO}" "${REPO_LABEL}" || MAC_NEEDS_UPLOAD=true
              done
              if [ "${MAC_NEEDS_UPLOAD}" = true ]; then
                echo "  Re-uploading corrected latest-mac.yml to ${REPO_LABEL}..."
                GH_TOKEN="${TOKEN}" gh release upload "${VERSION}" \
                  --repo "${REPO}" --clobber "${DL_DIR}/latest-mac.yml"
              fi
            fi
          }

          # Verify both repos — public first (auto-updater fetches from here)
          verify_repo "${PUBLIC_REPO}" "${GH_TOKEN}" "public"
          verify_repo "${PRIVATE_REPO}" "${GITHUB_TOKEN}" "private"

          # Cleanup
          rm -rf "${VERIFY_DIR}"

          if [ "${MISMATCH_FOUND}" = true ]; then
            echo ""
            echo "::warning::Hash mismatches were detected and corrected. Updated yml files re-uploaded."
          else
            echo ""
            echo "All release asset hashes verified successfully."
          fi

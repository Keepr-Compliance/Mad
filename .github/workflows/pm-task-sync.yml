name: PM Task Status Sync

# Auto-sync Supabase PM status when a PR is merged (BACKLOG-1875).
# - TASK-XXXX in branch name    -> pm_update_task_status -> 'completed'
#   (auto-close trigger on pm_tasks handles backlog item completion)
# - else BACKLOG-XXXX in branch -> pm_update_item_status -> 'testing'
#   (code merged = testing; only user verification marks completed)
#
# RPC failures (e.g. role-guard rejection, bad key) FAIL the run loudly
# instead of being masked as "task not found" — that masking hid a total
# sync outage (BACKLOG-1875). Genuine not-found still skips quietly.
#
# GitHub Secrets required:
#   PM_SUPABASE_URL              - Supabase project URL
#   PM_SUPABASE_SERVICE_ROLE_KEY - Supabase service-role key

on:
  pull_request:
    types: [closed]
    branches: [develop, main]

jobs:
  sync-task-status:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract task/backlog ID from branch name
        id: extract
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Branch: $BRANCH"
          TASK_ID=$(echo "$BRANCH" | grep -oE 'TASK-[0-9]+' | head -1)
          ITEM_ID=$(echo "$BRANCH" | grep -oE 'BACKLOG-[0-9]+' | head -1)
          if [ -n "$TASK_ID" ]; then
            echo "Found task: $TASK_ID"
            echo "mode=task" >> "$GITHUB_OUTPUT"
            echo "legacy_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          elif [ -n "$ITEM_ID" ]; then
            echo "Found backlog item: $ITEM_ID"
            echo "mode=item" >> "$GITHUB_OUTPUT"
            echo "legacy_id=$ITEM_ID" >> "$GITHUB_OUTPUT"
          else
            echo "No TASK-/BACKLOG- ID in branch name, skipping"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync task status (TASK -> completed)
        if: steps.extract.outputs.mode == 'task'
        env:
          SUPABASE_URL: ${{ secrets.PM_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.PM_SUPABASE_SERVICE_ROLE_KEY }}
          LEGACY_ID: ${{ steps.extract.outputs.legacy_id }}
        run: |
          # Look up task UUID
          HTTP_CODE=$(curl -s -o /tmp/lookup.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/pm_get_task_by_legacy_id" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"p_legacy_id\": \"${LEGACY_ID}\"}")
          RESPONSE=$(cat /tmp/lookup.json)
          echo "Lookup response (HTTP ${HTTP_CODE}): $RESPONSE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::pm_get_task_by_legacy_id failed (HTTP ${HTTP_CODE}): $RESPONSE"
            exit 1
          fi
          TASK_UUID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$TASK_UUID" ]; then
            echo "Task ${LEGACY_ID} not found in Supabase (HTTP 200, no id), skipping"
            exit 0
          fi
          echo "Task UUID: $TASK_UUID"

          # Mark completed
          HTTP_CODE=$(curl -s -o /tmp/update.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/pm_update_task_status" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"p_task_id\": \"${TASK_UUID}\", \"p_new_status\": \"completed\"}")
          RESPONSE=$(cat /tmp/update.json)
          echo "Update response (HTTP ${HTTP_CODE}): $RESPONSE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::pm_update_task_status failed (HTTP ${HTTP_CODE}): $RESPONSE"
            exit 1
          fi
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          if [ "$SUCCESS" = "true" ]; then
            echo "OK: ${LEGACY_ID} marked as completed"
          else
            echo "::warning::Could not update ${LEGACY_ID}: $RESPONSE"
          fi

      - name: Sync backlog item status (BACKLOG -> testing)
        if: steps.extract.outputs.mode == 'item'
        env:
          SUPABASE_URL: ${{ secrets.PM_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.PM_SUPABASE_SERVICE_ROLE_KEY }}
          LEGACY_ID: ${{ steps.extract.outputs.legacy_id }}
        run: |
          # Look up item UUID (pm_get_item_by_legacy_id RAISES on not-found -> HTTP 400;
          # distinguish that from auth/guard failures before the generic >=400 check)
          HTTP_CODE=$(curl -s -o /tmp/lookup.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/pm_get_item_by_legacy_id" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"p_legacy_id\": \"${LEGACY_ID}\"}")
          RESPONSE=$(cat /tmp/lookup.json)
          echo "Lookup response (HTTP ${HTTP_CODE}): $RESPONSE"
          if echo "$RESPONSE" | grep -q "Item not found"; then
            echo "Backlog item ${LEGACY_ID} not found in Supabase, skipping"
            exit 0
          fi
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::pm_get_item_by_legacy_id failed (HTTP ${HTTP_CODE}): $RESPONSE"
            exit 1
          fi
          ITEM_UUID=$(echo "$RESPONSE" | jq -r '.item.id // .id // empty')
          if [ -z "$ITEM_UUID" ]; then
            echo "::error::Could not extract item UUID from response: $RESPONSE"
            exit 1
          fi
          echo "Item UUID: $ITEM_UUID"

          # Mark testing (merged = testing; user verification -> completed)
          HTTP_CODE=$(curl -s -o /tmp/update.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/pm_update_item_status" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"p_item_id\": \"${ITEM_UUID}\", \"p_new_status\": \"testing\"}")
          RESPONSE=$(cat /tmp/update.json)
          echo "Update response (HTTP ${HTTP_CODE}): $RESPONSE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::pm_update_item_status failed (HTTP ${HTTP_CODE}): $RESPONSE"
            exit 1
          fi
          echo "OK: ${LEGACY_ID} marked as testing"

# Dependabot configuration
# BACKLOG-1108: Automated dependency updates
# BACKLOG-1675: Tightened config — group aggressively, ignore framework majors,
#               schedule overnight Sunday so auto-merge clears patch/minor by Monday.
#
# Major-version upgrades for framework-level packages are tracked separately:
#   - BACKLOG-1667/1668: React 19 + Next 16 migration
#   - BACKLOG-1669: Tailwind CSS 4 migration
#   - BACKLOG-1670: ESLint 10 (flat config)
#   - BACKLOG-1671: TypeScript 6
#   - BACKLOG-1672: Electron 41 + electron-builder 26
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ─── Root package (Electron desktop app) ────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "23:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Framework majors — tracked as planned migrations
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
      - dependency-name: "electron-builder"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@testing-library/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/jest"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"

  # NOTE: admin-portal is an npm *workspace* of the root package (see root
  # package.json "workspaces"). Its dependencies resolve into the ROOT
  # package-lock.json, and Vercel builds it via `cd .. && npm ci` (see
  # admin-portal/vercel.json). A separate "/admin-portal" Dependabot entry only
  # bumped the vestigial, un-deployed admin-portal/package-lock.json and caused
  # shared-lockfile PR conflicts (BACKLOG-1959). admin-portal deps are now
  # covered by the root "/" entry above. The standalone lockfile was removed.

  # ─── Broker Portal (Next.js) ────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/broker-portal"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "23:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "broker-portal"

  # ─── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "23:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    groups:
      actions-all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
